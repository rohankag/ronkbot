name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  # ── Docker Build & Push ──────────────────────────────────────────────────────
  docker:
    name: Docker — Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            rohankag/ronkbot:latest
            rohankag/ronkbot:${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.title=ronkbot
            org.opencontainers.image.description=Personal AI assistant — Telegram + n8n + Gemini
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/rohankag/ronkbot
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize
        run: |
          echo "## 🐳 Docker Hub" >> "$GITHUB_STEP_SUMMARY"
          echo "Published \`rohankag/ronkbot:${{ steps.meta.outputs.version }}\` and \`rohankag/ronkbot:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull rohankag/ronkbot:${{ steps.meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Homebrew Formula Update ───────────────────────────────────────────────────
  homebrew:
    name: Homebrew — Update Formula
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball SHA256
        id: sha
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          URL="https://github.com/rohankag/ronkbot/archive/${VERSION}.tar.gz"
          echo "Downloading tarball from: $URL"
          curl -fsSL "$URL" -o ronkbot.tar.gz
          SHA256=$(sha256sum ronkbot.tar.gz | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Computed SHA256: $SHA256"

      - name: Update Formula in homebrew-ronkbot tap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"

          # Fetch current formula from tap repo
          RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/rohankag/homebrew-ronkbot/contents/Formula/ronkbot.rb")

          CURRENT_SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          # Generate updated formula content (base64-encoded for GitHub API)
          FORMULA=$(cat <<EOF
class Ronkbot < Formula
  desc "Personal AI assistant — Telegram + n8n + Gemini, running on your Mac"
  homepage "https://github.com/rohankag/ronkbot"
  url "${URL}"
  sha256 "${SHA256}"
  license "MIT"
  version "${VERSION#v}"

  depends_on :macos
  depends_on "docker" => :build

  def install
    prefix.install Dir["*"]

    # Install the ronkbot CLI wrapper
    (bin/"ronkbot").write <<~EOS
      #!/usr/bin/env bash
      export RONKBOT_INSTALL_DIR="#{prefix}"
      exec bash "#{prefix}/install.sh" "\$@"
    EOS
    chmod 0755, bin/"ronkbot"
  end

  def post_install
    ohai "ronkbot #{version} installed!"
    puts <<~EOS

      To set up your personal AI bot, run:
        ronkbot config

      Documentation: https://github.com/rohankag/ronkbot

    EOS
  end

  test do
    assert_match "usage", shell_output("#{bin}/ronkbot help 2>&1", 0)
  end
end
EOF
)

          ENCODED=$(echo "$FORMULA" | base64 -w 0)

          # Commit updated formula to tap repo
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/rohankag/homebrew-ronkbot/contents/Formula/ronkbot.rb" \
            -d "{
              \"message\": \"Update formula for ${VERSION}\",
              \"content\": \"${ENCODED}\",
              \"sha\": \"${CURRENT_SHA}\"
            }"

          echo "## 🍺 Homebrew" >> "$GITHUB_STEP_SUMMARY"
          echo "Updated \`Formula/ronkbot.rb\` in \`rohankag/homebrew-ronkbot\` for ${VERSION}" >> "$GITHUB_STEP_SUMMARY"

  # ── Create GitHub Release ────────────────────────────────────────────────────
  github-release:
    name: GitHub Release — Create Draft
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          cat > release_notes.md <<EOF
          ## ronkbot ${VERSION}

          ### 🚀 Install

          **One-line installer (recommended):**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/rohankag/ronkbot/main/install.sh | bash
          \`\`\`

          **Homebrew (Mac):**
          \`\`\`bash
          brew tap rohankag/ronkbot
          brew install ronkbot
          ronkbot config
          \`\`\`

          **Docker:**
          \`\`\`bash
          docker pull rohankag/ronkbot:${VERSION}
          \`\`\`

          ### 📦 What's Included
          - Telegram + n8n + Gemini AI chat
          - Gmail integration (check, read, reply, search, analyze)
          - System monitoring, file operations, command execution
          - Writing style analyzer

          ### 📖 Documentation
          See [README](https://github.com/rohankag/ronkbot/blob/main/README.md) for full setup instructions.
          EOF
          echo "Release notes generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          make_latest: true
